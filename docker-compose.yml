# docker-compose.yml — клубная воронка (без Redis: FSM/планировщик не используются)
version: '3.8'

services:
  bot:
    build: .
    container_name: tg_club_bot
    restart: unless-stopped
    stdin_open: true
    tty: true
    env_file:
      - .env
    volumes:
      # Постоянное хранение SQLite-базы и лога на хосте
      - ./funnel_bot.db:/app/funnel_bot.db
      - ./bot.log:/app/bot.log
